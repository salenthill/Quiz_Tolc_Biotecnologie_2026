<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Quiz BIOTECNOLOGIE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #080f0c;
            --bg-card: #111d18;
            --bg-card-alt: #162520;
            --primary: #34d399;
            --primary-dim: rgba(52,211,153,0.12);
            --accent: #e5a930;
            --accent-dim: rgba(229,169,48,0.12);
            --text: #e4ece7;
            --text-muted: #6e8a7d;
            --correct: #22c55e;
            --correct-bg: rgba(34,197,94,0.07);
            --correct-border: rgba(34,197,94,0.35);
            --wrong: #f43f5e;
            --wrong-bg: rgba(244,63,94,0.07);
            --wrong-border: rgba(244,63,94,0.35);
            --border: #1a2e25;
            --border-light: #244035;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-text-size-adjust: 100%; }
        body {
            font-family: 'Source Sans 3', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 15% 30%, rgba(52,211,153,0.05) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 70%, rgba(229,169,48,0.035) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 100%, rgba(52,211,153,0.03) 0%, transparent 40%);
            animation: bgPulse 18s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes bgPulse {
            0% { opacity: 1; transform: scale(1) translateY(0); }
            100% { opacity: 0.6; transform: scale(1.08) translateY(-20px); }
        }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* Schermate */
        .screen { position: relative; z-index: 1; display: none; }
        .screen.active { display: flex; }

        /* Setup */
        #setup-screen {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: calc(var(--safe-top) + 2rem) 1rem calc(var(--safe-bottom) + 2rem);
        }
        .setup-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 560px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .setup-card .logo-icon {
            width: 56px; height: 56px;
            background: var(--primary-dim);
            border: 1px solid var(--correct-border);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1.25rem;
            color: var(--primary);
            font-size: 1.5rem;
        }

        /* Lista / Select */
        .list-box {
            width: 100%;
            height: 260px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.925rem;
            padding: 0.5rem;
            outline: none;
            overflow-y: auto;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .list-box:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-dim); }
        .list-box option {
            padding: 0.55rem 0.75rem;
            border-radius: 6px;
            margin-bottom: 2px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .list-box option:hover { background: var(--bg-card-alt); }
        .list-box option:checked { background: var(--primary-dim); color: var(--primary); }
        .list-box optgroup {
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            padding: 0.5rem 0.75rem 0.15rem;
        }

        /* Numero domande */
        .num-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Source Sans 3', sans-serif;
            font-size: 1rem;
            padding: 0.7rem 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .num-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-dim); }

        /* Bottone primario */
        .btn-primary {
            width: 100%;
            padding: 0.85rem 1.5rem;
            background: var(--primary);
            color: #080f0c;
            font-family: 'Source Sans 3', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.02em;
        }
        .btn-primary:hover { background: #4ade80; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(52,211,153,0.25); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-secondary {
            padding: 0.7rem 1.5rem;
            background: transparent;
            color: var(--primary);
            font-family: 'Source Sans 3', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid var(--border-light);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover { background: var(--primary-dim); border-color: var(--primary); }

        /* Quiz */
        #quiz-screen {
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: calc(var(--safe-top) + 1.5rem) 1rem calc(var(--safe-bottom) + 3rem);
        }
        .quiz-container { width: 100%; max-width: 700px; }
        .progress-track {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #4ade80);
            border-radius: 3px;
            transition: width 0.4s ease;
            position: relative;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 40px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25));
            animation: shimmer 1.5s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .question-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 2rem 1.75rem;
            margin-top: 1rem;
        }
        .question-area-badge {
            display: inline-block;
            padding: 0.25rem 0.7rem;
            background: var(--accent-dim);
            color: var(--accent);
            font-size: 0.78rem;
            font-weight: 600;
            border-radius: 6px;
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
            max-width: 100%;
            word-break: break-word;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.6;
            color: var(--text);
        }

        /* Opzioni risposta */
        .options-list { margin-top: 1.25rem; display: flex; flex-direction: column; gap: 0.65rem; }
        .option-btn {
            display: flex;
            align-items: flex-start;
            gap: 0.85rem;
            width: 100%;
            text-align: left;
            padding: 1rem 1.15rem;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Source Sans 3', sans-serif;
            font-size: 1rem;
            line-height: 1.5;
            cursor: pointer;
            transition: all 0.18s;
            -webkit-tap-highlight-color: transparent;
        }
        .option-btn:hover:not(.locked) {
            border-color: var(--border-light);
            background: var(--bg-card-alt);
        }
        .option-btn.selected:not(.locked) {
            border-color: var(--primary);
            background: var(--primary-dim);
        }
        .option-btn .opt-letter {
            flex-shrink: 0;
            width: 30px; height: 30px;
            border-radius: 8px;
            background: var(--border);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-muted);
            transition: all 0.18s;
        }
        .option-btn.selected:not(.locked) .opt-letter {
            background: var(--primary);
            color: #080f0c;
        }
        .option-btn.locked { cursor: default; }
        .option-btn.correct-answer {
            border-color: var(--correct-border) !important;
            background: var(--correct-bg) !important;
        }
        .option-btn.correct-answer .opt-letter {
            background: var(--correct) !important;
            color: #fff !important;
        }
        .option-btn.wrong-selected {
            border-color: var(--wrong-border) !important;
            background: var(--wrong-bg) !important;
        }
        .option-btn.wrong-selected .opt-letter {
            background: var(--wrong) !important;
            color: #fff !important;
        }
        .option-btn.dimmed { opacity: 0.45; }

        /* Feedback */
        .feedback-box {
            margin-top: 1.25rem;
            border-radius: 12px;
            padding: 1.25rem 1.35rem;
            animation: slideDown 0.35s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .feedback-box.correct {
            background: var(--correct-bg);
            border: 1px solid var(--correct-border);
        }
        .feedback-box.wrong {
            background: var(--wrong-bg);
            border: 1px solid var(--wrong-border);
        }
        .feedback-title {
            display: flex; align-items: center; gap: 0.6rem;
            font-weight: 700; font-size: 1.05rem;
            margin-bottom: 0.65rem;
        }
        .feedback-box.correct .feedback-title { color: var(--correct); }
        .feedback-box.wrong .feedback-title { color: var(--wrong); }
        .spiegazione-box {
            margin-top: 0.85rem;
            padding: 1rem 1.15rem;
            background: rgba(255,255,255,0.03);
            border-left: 3px solid var(--accent);
            border-radius: 0 8px 8px 0;
            font-size: 0.95rem;
            line-height: 1.65;
            color: #c5d4cb;
        }
        .spiegazione-label {
            font-weight: 700;
            color: var(--accent);
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 0.35rem;
        }

        /* Risultati */
        #results-screen {
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: calc(var(--safe-top) + 2rem) 1rem calc(var(--safe-bottom) + 3rem);
        }
        .results-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            text-align: center;
        }
        .score-ring { margin: 0 auto 1.25rem; }
        .score-ring circle { transition: stroke-dashoffset 1.2s ease; }
        .review-item {
            text-align: left;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.15rem 1.25rem;
            margin-bottom: 0.75rem;
        }
        .review-item.was-correct { border-left: 3px solid var(--correct); }
        .review-item.was-wrong { border-left: 3px solid var(--wrong); }
        .review-q-text {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.55;
            color: var(--text);
            margin-bottom: 0.75rem;
        }
        .review-opt-row {
            display: flex;
            align-items: flex-start;
            gap: 0.65rem;
            padding: 0.45rem 0.55rem;
            border-radius: 7px;
            font-size: 0.9rem;
            line-height: 1.45;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }
        .review-opt-row.rev-correct {
            background: var(--correct-bg);
            color: var(--correct);
            font-weight: 600;
        }
        .review-opt-row.rev-wrong {
            background: var(--wrong-bg);
            color: var(--wrong);
            font-weight: 600;
        }
        .review-opt-letter {
            flex-shrink: 0;
            width: 24px; height: 24px;
            border-radius: 6px;
            background: var(--border);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .review-opt-row.rev-correct .review-opt-letter {
            background: var(--correct);
            color: #fff;
        }
        .review-opt-row.rev-wrong .review-opt-letter {
            background: var(--wrong);
            color: #fff;
        }
        .review-status-icon {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.82rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .review-status-icon.is-correct { color: var(--correct); }
        .review-status-icon.is-wrong { color: var(--wrong); }

        /* Scrollbar personalizzata */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Responsivo tablet */
        @media (max-width: 640px) {
            .setup-card { padding: 1.75rem 1.25rem; }
            .question-card { padding: 1.5rem 1.25rem; }
            .question-text { font-size: 1.08rem; }
            .list-box { height: 220px; font-size: 0.85rem; }
        }

        /* Responsivo smartphone (390px logici, ~2532x1170 fisici a 460ppi) */
        @media (max-width: 430px) {
            .setup-card { padding: 1.5rem 1.15rem; border-radius: 14px; }
            .setup-card .logo-icon { width: 46px; height: 46px; font-size: 1.2rem; border-radius: 11px; }
            .setup-card h1 { font-size: 1.3rem !important; }
            .list-box { height: 190px; font-size: 0.82rem; border-radius: 8px; }
            .num-input { font-size: 0.95rem; padding: 0.6rem 0.8rem; }

            #quiz-screen { padding: calc(var(--safe-top) + 0.75rem) 0.7rem calc(var(--safe-bottom) + 2rem); }
            .question-card { padding: 1.2rem 1rem; border-radius: 11px; margin-top: 0.6rem; }
            .question-area-badge { font-size: 0.7rem; padding: 0.2rem 0.55rem; margin-bottom: 0.7rem; }
            .question-text { font-size: 1rem; line-height: 1.5; }
            .options-list { gap: 0.45rem; margin-top: 1rem; }
            .option-btn {
                padding: 0.7rem 0.85rem;
                font-size: 0.9rem;
                line-height: 1.45;
                gap: 0.7rem;
                border-radius: 9px;
            }
            .option-btn .opt-letter { width: 27px; height: 27px; font-size: 0.8rem; border-radius: 7px; }
            .feedback-box { padding: 1rem 1rem; margin-top: 1rem; border-radius: 10px; }
            .feedback-title { font-size: 0.95rem; }
            .spiegazione-box { font-size: 0.88rem; padding: 0.8rem 0.9rem; }
            .spiegazione-label { font-size: 0.76rem; }
            .btn-primary { padding: 0.75rem 1rem; font-size: 0.95rem; min-height: 44px; }
            .btn-secondary { padding: 0.6rem 1rem; font-size: 0.88rem; min-height: 44px; }

            .results-card { padding: 1.75rem 1.15rem; border-radius: 14px; }
            .review-item { padding: 0.9rem 1rem; margin-bottom: 0.6rem; }
            .review-q-text { font-size: 0.88rem; margin-bottom: 0.6rem; }
            .review-opt-row { font-size: 0.83rem; padding: 0.35rem 0.45rem; gap: 0.5rem; }
            .review-opt-letter { width: 22px; height: 22px; font-size: 0.7rem; border-radius: 5px; }
        }

        /* Schermi molto stretti (< 360px) */
        @media (max-width: 359px) {
            .option-btn { font-size: 0.85rem; padding: 0.6rem 0.7rem; gap: 0.55rem; }
            .option-btn .opt-letter { width: 24px; height: 24px; font-size: 0.73rem; }
            .question-text { font-size: 0.95rem; }
            .review-q-text { font-size: 0.84rem; }
            .review-opt-row { font-size: 0.8rem; }
        }

        /* Riduzione movimento */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>

    <!-- ============ SETUP ============ -->
    <div id="setup-screen" class="screen active">
        <div class="setup-card">
            <div class="logo-icon"><i class="fa-solid fa-stethoscope"></i></div>
            <h1 class="text-2xl mb-1" style="color:var(--text);">Quiz BIOTECNOLOGIE</h1>
            <p style="color:var(--text-muted); font-size:0.95rem; margin-bottom:1.75rem;">BIOTECNOLOGIE — Test di autovalutazione</p>

            <h2 class="text-lg mb-3" style="color:var(--text); font-weight:700;">Prepara la tua sessione</h2>

            <label style="display:block; font-size:0.85rem; font-weight:600; color:var(--text-muted); margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.06em;">
                Seleziona area tematica
            </label>
            <select id="category-select" class="list-box" aria-label="Selezione area tematica"></select>

            <div style="margin-top:1.25rem;">
                <label for="num-questions" style="display:block; font-size:0.85rem; font-weight:600; color:var(--text-muted); margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.06em;">
                    Numero di domande
                </label>
                <input type="number" id="num-questions" class="num-input" min="1" value="5" aria-label="Numero di domande">
                <p id="num-hint" style="font-size:0.8rem; color:var(--text-muted); margin-top:0.3rem;"></p>
            </div>

            <div style="margin-top:1.5rem;">
                <button id="start-btn" class="btn-primary" disabled>
                    <i class="fa-solid fa-play" style="margin-right:0.4rem;"></i> Inizia il Quiz
                </button>
            </div>
        </div>
    </div>

    <!-- ============ QUIZ ============ -->
    <div id="quiz-screen" class="screen">
        <div class="quiz-container">
            <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:0.25rem;">
                <span id="q-counter" style="font-size:0.85rem; color:var(--text-muted); font-weight:600;"></span>
                <span id="q-score" style="font-size:0.85rem; color:var(--primary); font-weight:700;"></span>
            </div>
            <div class="progress-track"><div id="progress-fill" class="progress-fill" style="width:0%"></div></div>

            <div class="question-card">
                <span id="q-area-badge" class="question-area-badge"></span>
                <p id="q-text" class="question-text"></p>

                <div id="q-options" class="options-list" role="radiogroup"></div>

                <div id="feedback-container" style="display:none;"></div>
            </div>

            <div style="display:flex; gap:0.75rem; margin-top:1.25rem;">
                <button id="submit-btn" class="btn-primary" style="flex:1;" disabled>
                    <i class="fa-solid fa-check" style="margin-right:0.35rem;"></i> Conferma
                </button>
                <button id="next-btn" class="btn-primary" style="flex:1; display:none;">
                    Prossima <i class="fa-solid fa-arrow-right" style="margin-left:0.35rem;"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- ============ RISULTATI ============ -->
    <div id="results-screen" class="screen">
        <div class="results-card">
            <h1 class="text-2xl mb-4" style="color:var(--text);">Risultati</h1>

            <svg class="score-ring" viewBox="0 0 120 120" width="150" height="150">
                <circle cx="60" cy="60" r="52" stroke="var(--border)" stroke-width="8" fill="none"/>
                <circle id="score-arc" cx="60" cy="60" r="52" stroke="var(--primary)" stroke-width="8" fill="none"
                        stroke-dasharray="326.73" stroke-dashoffset="326.73" stroke-linecap="round"
                        transform="rotate(-90 60 60)"/>
                <text id="score-pct" x="60" y="56" text-anchor="middle" fill="var(--text)" font-family="Playfair Display,serif" font-size="28" font-weight="900">0%</text>
                <text id="score-fraction" x="60" y="76" text-anchor="middle" fill="var(--text-muted)" font-family="Source Sans 3,sans-serif" font-size="13" font-weight="600">0/0</text>
            </svg>

            <p id="result-message" style="font-size:1.05rem; color:var(--text-muted); margin-bottom:1.75rem; line-height:1.5;"></p>

            <div style="display:flex; gap:0.75rem; justify-content:center; margin-bottom:1.5rem; flex-wrap:wrap;">
                <button id="retry-btn" class="btn-secondary"><i class="fa-solid fa-rotate-right" style="margin-right:0.3rem;"></i> Riprova</button>
                <button id="new-session-btn" class="btn-primary" style="width:auto; padding:0.7rem 1.5rem;">
                    <i class="fa-solid fa-house" style="margin-right:0.3rem;"></i> Nuova Sessione
                </button>
            </div>

            <div style="text-align:left;">
                <h3 style="font-size:1rem; color:var(--text-muted); margin-bottom:0.75rem; font-family:'Source Sans 3',sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:0.06em;">Riepilogo risposte</h3>
                <div id="review-list"></div>
            </div>
        </div>
    </div>

    <script>
    /* ================================================================
       DATI DEL QUIZ (prime 5 domande, 5 alternative a–e)
       ================================================================ */
    window.__QUIZ_DATA__ = [
	  {
		"domanda": "Qual è la natura del legame chimico che unisce gli atomi di idrogeno all'atomo di ossigeno all'interno di una molecola d'acqua?",

    /* ================================================================
       STATO DELL'APPLICAZIONE
       ================================================================ */
    let categories = [];
    let selectedFilter = null;
    let selectedCount = 0;
    let quizQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let userAnswers = [];
    let selectedOption = null;
    let answered = false;

    /* ================================================================
       FUNZIONI HELPER
       ================================================================ */
    function isDispensa(area) {
        return /dispensa$/i.test(area) || /dispense$/i.test(area);
    }
    function isAltreFonti(area) {
        return /altre fonti$/i.test(area);
    }
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // Genera le opzioni mescolate per una domanda (5 alternative: a, b, c, d, e)
    function getShuffledOptions(q) {
        const opts = [
            { key: 'a', text: q.a },
            { key: 'b', text: q.b },
            { key: 'c', text: q.c },
            { key: 'd', text: q.d },
            { key: 'e', text: q.e }
        ];
        return shuffle(opts);
    }

    // Mappa indice → lettera mostrata (A, B, C, D, E)
    function keyToLetter(index) {
        return String.fromCharCode(65 + index);
    }

    /* ================================================================
       GENERAZIONE DINAMICA DELLE CATEGORIE
       ================================================================ */
    function buildCategories() {
        const data = window.__QUIZ_DATA__;
        const cats = [];

        cats.push({
            label: 'Tutte le domande (' + data.length + ')',
            filterFn: function() { return true; },
            count: data.length
        });

        const compiti = data.filter(function(q) { return q.area === 'compito'; });
        cats.push({
            label: 'Compiti (' + compiti.length + ')',
            filterFn: function(q) { return q.area === 'compito'; },
            count: compiti.length
        });

        const dispense = data.filter(function(q) { return isDispensa(q.area); });
        cats.push({
            label: 'Dispense (' + dispense.length + ')',
            filterFn: function(q) { return isDispensa(q.area); },
            count: dispense.length
        });

        const altre = data.filter(function(q) { return isAltreFonti(q.area); });
        cats.push({
            label: 'Altre fonti (' + altre.length + ')',
            filterFn: function(q) { return isAltreFonti(q.area); },
            count: altre.length
        });

        const dispAlt = data.filter(function(q) { return isDispensa(q.area) || isAltreFonti(q.area); });
        cats.push({
            label: 'Dispense + Altre fonti (' + dispAlt.length + ')',
            filterFn: function(q) { return isDispensa(q.area) || isAltreFonti(q.area); },
            count: dispAlt.length
        });

        const topicMap = {};
        data.forEach(function(q) {
            const idx = q.area.indexOf(' - ');
            if (idx > 0) {
                const topic = q.area.substring(0, idx).trim();
                if (!topicMap[topic]) topicMap[topic] = 0;
                topicMap[topic]++;
            }
        });

        const topics = Object.keys(topicMap).sort();
        topics.forEach(function(topic) {
            cats.push({
                label: topic + ' (' + topicMap[topic] + ')',
                filterFn: function(q) { return q.area.startsWith(topic); },
                count: topicMap[topic]
            });
        });

        return cats;
    }

    /* ================================================================
       POPOLAMENTO LISTA (SELECT con OPTGROUP)
       ================================================================ */
    function populateList() {
        const sel = document.getElementById('category-select');
        sel.innerHTML = '';

        const ogFixed = document.createElement('optgroup');
        ogFixed.label = 'Categorie';
        for (let i = 0; i < Math.min(5, categories.length); i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = categories[i].label;
            ogFixed.appendChild(opt);
        }
        sel.appendChild(ogFixed);

        if (categories.length > 5) {
            const ogTopics = document.createElement('optgroup');
            ogTopics.label = 'Argomenti';
            for (let i = 5; i < categories.length; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = categories[i].label;
                ogTopics.appendChild(opt);
            }
            sel.appendChild(ogTopics);
        }
    }

    /* ================================================================
       GESTIONE SETUP
       ================================================================ */
    function onCategoryChange() {
        const idx = parseInt(document.getElementById('category-select').value);
        if (isNaN(idx) || !categories[idx]) return;
        const cat = categories[idx];
        selectedFilter = cat.filterFn;
        selectedCount = cat.count;

        const numInput = document.getElementById('num-questions');
        const hint = document.getElementById('num-hint');
        const startBtn = document.getElementById('start-btn');

        numInput.max = selectedCount;
        numInput.min = 1;
        hint.textContent = 'Disponibili: ' + selectedCount + ' domande';

        if (parseInt(numInput.value) > selectedCount) {
            numInput.value = selectedCount;
        }
        if (parseInt(numInput.value) < 1) {
            numInput.value = 1;
        }
        startBtn.disabled = (selectedCount === 0);
    }

    /* ================================================================
       AVVIO DEL QUIZ
       ================================================================ */
    function startQuiz() {
        const num = parseInt(document.getElementById('num-questions').value);
        const count = Math.min(Math.max(num, 1), selectedCount);

        const filtered = window.__QUIZ_DATA__.filter(selectedFilter);
        quizQuestions = shuffle(filtered).slice(0, count);

        currentIndex = 0;
        score = 0;
        userAnswers = [];

        switchScreen('quiz-screen');
        renderQuestion();
    }

    /* ================================================================
       RENDERING DOMANDA
       ================================================================ */
    function renderQuestion() {
        answered = false;
        selectedOption = null;

        const q = quizQuestions[currentIndex];
        const total = quizQuestions.length;
        const shuffled = getShuffledOptions(q);

        document.getElementById('q-counter').textContent = 'Domanda ' + (currentIndex + 1) + ' di ' + total;
        document.getElementById('q-score').textContent = 'Punteggio: ' + score + '/' + currentIndex;

        const pct = ((currentIndex) / total) * 100;
        document.getElementById('progress-fill').style.width = pct + '%';

        document.getElementById('q-area-badge').textContent = q.area;
        document.getElementById('q-text').textContent = q.domanda;

        const optContainer = document.getElementById('q-options');
        optContainer.innerHTML = '';
        shuffled.forEach(function(opt, i) {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.setAttribute('role', 'radio');
            btn.setAttribute('aria-checked', 'false');
            btn.dataset.key = opt.key;
            btn.innerHTML =
                '<span class="opt-letter">' + keyToLetter(i) + '</span>' +
                '<span>' + opt.text + '</span>';
            btn.addEventListener('click', function() { selectOption(btn, opt.key); });
            optContainer.appendChild(btn);
        });

        document.getElementById('feedback-container').style.display = 'none';
        document.getElementById('feedback-container').innerHTML = '';
        document.getElementById('submit-btn').style.display = '';
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('next-btn').style.display = 'none';
    }

    /* ================================================================
       SELEZIONE OPZIONE
       ================================================================ */
    function selectOption(btn, key) {
        if (answered) return;
        selectedOption = key;

        const allBtns = document.querySelectorAll('#q-options .option-btn');
        allBtns.forEach(function(b) {
            b.classList.remove('selected');
            b.setAttribute('aria-checked', 'false');
        });
        btn.classList.add('selected');
        btn.setAttribute('aria-checked', 'true');

        document.getElementById('submit-btn').disabled = false;
    }

    /* ================================================================
       CONFERMA RISPOSTA
       ================================================================ */
    function submitAnswer() {
        if (answered || selectedOption === null) return;
        answered = true;

        const q = quizQuestions[currentIndex];
        const isCorrect = selectedOption === q.risposta_corretta;
        if (isCorrect) score++;

        // Salva la risposta per il riepilogo
        const shuffledOpts = [];
        document.querySelectorAll('#q-options .option-btn').forEach(function(b) {
            shuffledOpts.push({
                key: b.dataset.key,
                text: b.querySelector('span:last-child').textContent
            });
        });
        userAnswers.push({
            selectedKey: selectedOption,
            correctKey: q.risposta_corretta,
            isCorrect: isCorrect,
            question: q,
            shuffledOptions: shuffledOpts
        });

        // Blocca tutte le opzioni e applica stili
        const allBtns = document.querySelectorAll('#q-options .option-btn');
        allBtns.forEach(function(b) {
            b.classList.add('locked');
            const k = b.dataset.key;
            if (k === q.risposta_corretta) {
                b.classList.add('correct-answer');
            } else if (k === selectedOption && !isCorrect) {
                b.classList.add('wrong-selected');
            } else {
                b.classList.add('dimmed');
            }
        });

        // Aggiorna punteggio visibile
        document.getElementById('q-score').textContent = 'Punteggio: ' + score + '/' + (currentIndex + 1);

        // Mostra feedback
        var fc = document.getElementById('feedback-container');
        fc.style.display = 'block';
        var feedbackClass = isCorrect ? 'correct' : 'wrong';
        var feedbackIcon = isCorrect ? 'fa-circle-check' : 'fa-circle-xmark';
        var feedbackLabel = isCorrect ? 'Risposta corretta' : 'Risposta errata';
        fc.innerHTML =
            '<div class="feedback-box ' + feedbackClass + '">' +
                '<div class="feedback-title"><i class="fa-solid ' + feedbackIcon + '"></i> ' + feedbackLabel + '</div>' +
                '<div class="spiegazione-box">' +
                    '<div class="spiegazione-label">Spiegazione</div>' +
                    q.spiegazione +
                '</div>' +
            '</div>';

        // Nascondi conferma, mostra avanti
        document.getElementById('submit-btn').style.display = 'none';
        var nextBtn = document.getElementById('next-btn');
        nextBtn.style.display = '';
        if (currentIndex < quizQuestions.length - 1) {
            nextBtn.innerHTML = 'Prossima <i class="fa-solid fa-arrow-right" style="margin-left:0.35rem;"></i>';
        } else {
            nextBtn.innerHTML = '<i class="fa-solid fa-trophy" style="margin-right:0.35rem;"></i> Vedi risultati';
        }

        // Scroll per far vedere il feedback su smartphone
        setTimeout(function() {
            fc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
    }

    /* ================================================================
       DOMANDA SUCCESSIVA
       ================================================================ */
    function nextQuestion() {
        currentIndex++;
        if (currentIndex >= quizQuestions.length) {
            showResults();
        } else {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            renderQuestion();
        }
    }

    /* ================================================================
       VISUALIZZAZIONE RISULTATI
       ================================================================ */
    function showResults() {
        switchScreen('results-screen');

        var total = quizQuestions.length;
        var pct = Math.round((score / total) * 100);

        // Anello punteggio
        var circumference = 2 * Math.PI * 52;
        var offset = circumference - (circumference * pct / 100);
        var arc = document.getElementById('score-arc');
        arc.style.strokeDashoffset = circumference;
        setTimeout(function() {
            arc.style.strokeDashoffset = offset;
        }, 50);

        document.getElementById('score-pct').textContent = pct + '%';
        document.getElementById('score-fraction').textContent = score + '/' + total;

        // Colore dell'arco in base al punteggio
        if (pct >= 80) {
            arc.setAttribute('stroke', 'var(--correct)');
        } else if (pct >= 50) {
            arc.setAttribute('stroke', 'var(--accent)');
        } else {
            arc.setAttribute('stroke', 'var(--wrong)');
        }

        // Messaggio
        var msg = '';
        if (pct === 100) {
            msg = 'Perfetto! Hai risposto correttamente a tutte le domande.';
        } else if (pct >= 80) {
            msg = 'Ottimo risultato! Pochi errori, continua così.';
        } else if (pct >= 60) {
            msg = 'Buon lavoro, ma c\'è ancora margine di miglioramento.';
        } else if (pct >= 40) {
            msg = 'Risultato insufficiente. Ti consiglio di rivedere gli argomenti.';
        } else {
            msg = 'Risultato basso. Ripassa la dispensa e riprova.';
        }
        document.getElementById('result-message').textContent = msg;

        // Riepilogo risposte
        var reviewList = document.getElementById('review-list');
        reviewList.innerHTML = '';
        userAnswers.forEach(function(ans, idx) {
            var div = document.createElement('div');
            div.className = 'review-item ' + (ans.isCorrect ? 'was-correct' : 'was-wrong');

            // Icona stato
            var statusClass = ans.isCorrect ? 'is-correct' : 'is-wrong';
            var statusIcon = ans.isCorrect ? 'fa-circle-check' : 'fa-circle-xmark';
            var statusText = ans.isCorrect ? 'Corretta' : 'Errata';

            var html = '<div class="review-status-icon ' + statusClass + '">';
            html += '<i class="fa-solid ' + statusIcon + '"></i> ' + statusText;
            html += '</div>';

            // Testo della domanda
            html += '<div class="review-q-text">' + (idx + 1) + '. ' + ans.question.domanda + '</div>';

            // Lista delle opzioni come le ha viste l'utente
            ans.shuffledOptions.forEach(function(opt, optIdx) {
                var rowClass = 'review-opt-row';
                if (opt.key === ans.correctKey) {
                    rowClass += ' rev-correct';
                } else if (opt.key === ans.selectedKey && !ans.isCorrect) {
                    rowClass += ' rev-wrong';
                }
                html += '<div class="' + rowClass + '">';
                html += '<span class="review-opt-letter">' + keyToLetter(optIdx) + '</span>';
                html += '<span>' + opt.text + '</span>';
                html += '</div>';
            });

            div.innerHTML = html;
            reviewList.appendChild(div);
        });

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ================================================================
       NAVIGAZIONE SCHERMATE
       ================================================================ */
    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(function(s) {
            s.classList.remove('active');
        });
        document.getElementById(id).classList.add('active');
        window.scrollTo(0, 0);
    }

    /* ================================================================
       INIZIALIZZAZIONE
       ================================================================ */
    function init() {
        categories = buildCategories();
        populateList();
        onCategoryChange();

        document.getElementById('category-select').addEventListener('change', onCategoryChange);
        document.getElementById('num-questions').addEventListener('input', function() {
            var v = parseInt(this.value);
            if (v > selectedCount) this.value = selectedCount;
            if (v < 1 && this.value !== '') this.value = 1;
        });
        document.getElementById('start-btn').addEventListener('click', startQuiz);
        document.getElementById('submit-btn').addEventListener('click', submitAnswer);
        document.getElementById('next-btn').addEventListener('click', nextQuestion);
        document.getElementById('retry-btn').addEventListener('click', function() {
            startQuiz();
        });
        document.getElementById('new-session-btn').addEventListener('click', function() {
            switchScreen('setup-screen');
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    </script>
